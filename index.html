<!DOCTYPE html>
<html>
<head>
  <title>Fraud Detection</title>
</head>
<body>
  <h2>Credit Card Fraud Detection</h2>

  <label>Test with:</label><br/>
  <button onclick="checkFraud('normal')">Normal Sample</button>
  <button onclick="checkFraud('fraud')">Fraud Sample</button>

  <p id="result"></p>

  <script>
    // Paste actual rows from your dataset here
    // normal_sample and fraud_sample = the 30 feature values (Time, V1..V28, Amount)
    // Run this in your notebook to get them:
    //   normal_sample = df[df['Class'] == 0].iloc[0].drop('Class').tolist()
    //   fraud_sample  = df[df['Class'] == 1].iloc[0].drop('Class').tolist()
    const SAMPLES = {
      normal: [/* paste output of normal_sample here */],
      fraud:  [/* paste output of fraud_sample here */]
    };

    async function checkFraud(type) {
      const res = await fetch("https://creditfraud.onrender.com/predict", {  // removed trailing slash
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ input: SAMPLES[type] })
      });

      const data = await res.json();
      document.getElementById("result").innerText =
        data.prediction === 1 ? "🚨 Fraud Detected" : "✅ Normal Transaction";
    }
  </script>
</body>
</html>
